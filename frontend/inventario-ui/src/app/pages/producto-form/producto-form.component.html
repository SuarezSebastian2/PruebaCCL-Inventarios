<section class="panel animate-in">
  <header class="panel__head">
    <div>
      <a routerLink="/inventario" class="panel__back" title="Volver al inventario">← Inventario</a>
      <h1 class="panel__title">{{ titulo }}</h1>
      <p class="panel__sub">
        @if (productoId != null) {
          Modifique nombre o cantidad en stock. Para entradas o salidas use Movimiento.
        } @else {
          Defina el nombre y la cantidad inicial. Luego puede ajustar con movimientos.
        }
      </p>
    </div>
  </header>

  @if (loadingProducto) {
    <div class="skeleton" role="status">
      <div class="skeleton__row"></div>
      <div class="skeleton__row"></div>
    </div>
  } @else {
    <form class="form" [formGroup]="form" (ngSubmit)="enviar()">
      <div class="form__grid">
        <label class="field field--grow">
          <span class="field__label">Nombre del producto</span>
          <input
            type="text"
            formControlName="nombre"
            maxlength="200"
            title="Nombre visible en inventario (máximo 200 caracteres)"
            placeholder="Ej. Guantes seguridad talla L"
          />
          @if (form.controls.nombre.invalid && form.controls.nombre.touched) {
            <span class="field__hint msg msg--inline msg--err">Indique un nombre entre 1 y 200 caracteres.</span>
          }
        </label>

        <label class="field field--narrow">
          <span class="field__label">{{ productoId != null ? 'Cantidad en stock' : 'Cantidad inicial' }}</span>
          <input
            type="number"
            min="0"
            formControlName="cantidad"
            title="Unidades en stock (0 o más)"
          />
          @if (form.controls.cantidad.invalid && form.controls.cantidad.touched) {
            <span class="field__hint msg msg--inline msg--err">Use un número entero mayor o igual a 0.</span>
          }
        </label>
      </div>

      <div class="form__actions">
        <a routerLink="/inventario" class="btn btn--ghost link-btn">Cancelar</a>
        <button type="submit" class="btn btn--primary" [disabled]="submitting">
          {{ submitting ? 'Guardando…' : productoId != null ? 'Guardar cambios' : 'Crear producto' }}
        </button>
      </div>
    </form>
  }
</section>
